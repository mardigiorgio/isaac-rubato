seed: 44
device: cuda:0
num_steps_per_env: 24
max_iterations: 1000
empirical_normalization: {}
obs_groups: {}
clip_actions: null
check_for_nan: true
save_interval: 50
experiment_name: reach_franka
run_name: franka-reach-mujoco-adaptive-s44-r1
logger: wandb
neptune_project: newton-adaptive-study
wandb_project: newton-adaptive-study
resume: false
load_run: .*
load_checkpoint: model_.*.pt
class_name: OnPolicyRunner
actor:
  class_name: MLPModel
  hidden_dims:
  - 64
  - 64
  activation: elu
  obs_normalization: false
  distribution_cfg:
    class_name: GaussianDistribution
    init_std: 1.0
    std_type: scalar
critic:
  class_name: MLPModel
  hidden_dims:
  - 64
  - 64
  activation: elu
  obs_normalization: false
  distribution_cfg: null
algorithm:
  class_name: PPO
  num_learning_epochs: 8
  num_mini_batches: 4
  learning_rate: 0.001
  schedule: adaptive
  gamma: 0.99
  lam: 0.95
  entropy_coef: 0.001
  desired_kl: 0.01
  max_grad_norm: 1.0
  optimizer: adam
  value_loss_coef: 1.0
  use_clipped_value_loss: true
  clip_param: 0.2
  normalize_advantage_per_mini_batch: false
  share_cnn_encoders: false
  rnd_cfg: null
  symmetry_cfg: null
policy: {}
